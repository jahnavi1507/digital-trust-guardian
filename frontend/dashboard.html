<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>DTG</h2>
    <ul>
      <li>🏠 Dashboard</li>
      <li>⚠️ Alerts</li>
      <li>📊 Analytics</li>
      <li onclick="logout()">🚪 Logout</li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="navbar">
      <h2>Dashboard</h2>
      <p>Welcome, Admin</p>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>⚠️ Threat Alerts</h3>
        <p>5 Active</p>
      </div>

      <div class="card">
        <h3>📊 Risk Level</h3>
        <p>Medium</p>
      </div>

      <div class="card">
        <h3>👥 Reports</h3>
        <p>18 Reports</p>
      </div>
    </div>

    <!-- Charts Section -->
    <div class="charts">
      <div class="chart-box">
        <canvas id="barChart"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <!-- Checker -->
    <div class="checker-box">
      <h3>Check Message</h3>
      <input id="msg" placeholder="Enter message">
      <button onclick="checkMsg()">Analyze</button>
    </div>

  </div>

</div>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}

function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

function checkMsg(){
  let msg = document.getElementById("msg").value;

  if(msg.includes("OTP") || msg.includes("loan") || msg.includes("bank") || msg.includes("urgent")){
    alert("⚠️ Scam detected!");
    speakAlert("Warning! This message may be a scam");
  } else {
    alert("Safe message");
    speakAlert("This message is safe");
  }
}
/* 📊 BAR CHART */
new Chart(document.getElementById("barChart"), {
  type: "bar",
  data: {
    labels: ["Mon", "Tue", "Wed", "Thu", "Fri"],
    datasets: [{
      label: "Fraud Alerts",
      data: [2, 5, 3, 6, 4]
    }]
  }
});

/* 🥧 PIE CHART */
new Chart(document.getElementById("pieChart"), {
  type: "pie",
  data: {
    labels: ["Safe", "Suspicious", "Fraud"],
    datasets: [{
      data: [60, 25, 15]
    }]
  }
});
setInterval(() => {
  console.log("⚠️ New Scam Alert Detected");
}, 10000);
function speakAlert(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-IN"; // Indian voice
  speech.rate = 1;
  speech.pitch = 1;

  window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
