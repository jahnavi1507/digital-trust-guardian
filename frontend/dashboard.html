<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Dashboard</h2>
  <button onclick="logout()" class="btn">Logout</button>
</header>

<div class="dashboard">

  <div class="card">
    <h3>⚠️ Threat Alerts</h3>
    <p id="alerts">3 Suspicious Messages</p>
  </div>

  <div class="card">
    <h3>📊 Risk Level</h3>
    <p>Medium</p>
  </div>

  <div class="card">
    <h3>👥 Community Reports</h3>
    <p>12 Reports</p>
  </div>

</div>

<div class="checker">
  <h3>Check Message</h3>
  <input id="msg" placeholder="Enter message">
  <button onclick="checkMsg()">Check</button>
</div>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}

function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

function checkMsg(){
  let msg = document.getElementById("msg").value;

  if(msg.includes("OTP") || msg.includes("loan") || msg.includes("bank") || msg.includes("urgent")){
    alert("⚠️ Scam detected!");
  } else {
    alert("✅ Safe message");
  }
}
</script>

</body>
</html>
