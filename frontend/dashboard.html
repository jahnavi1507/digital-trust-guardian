<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h1>Dashboard</h1>

<button onclick="logout()">Logout</button>

<h3>Check Message</h3>
<input id="msg" placeholder="Enter message">
<button onclick="checkMsg()">Check</button>

<script>
// Protect page
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}

// Logout
function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

// Scam detection
function checkMsg(){
  let msg = document.getElementById("msg").value;

  if(msg.includes("OTP") || msg.includes("loan") || msg.includes("bank") || msg.includes("urgent")){
    alert("⚠️ Scam detected!");
  } else {
    alert("✅ Safe message");
  }
}
</script>

</body>
</html>
