<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>DTG</h2>
    <ul>
      <li>🏠 Dashboard</li>
      <li>⚠️ Alerts</li>
      <li>📊 Analytics</li>
      <li onclick="logout()">🚪 Logout</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Navbar -->
    <div class="navbar">
      <h2>Dashboard</h2>
      <p>Welcome, Admin</p>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>⚠️ Threat Alerts</h3>
        <p>5 Active</p>
      </div>

      <div class="card">
        <h3>📊 Risk Level</h3>
        <p>Medium</p>
      </div>

      <div class="card">
        <h3>👥 Reports</h3>
        <p>18 Reports</p>
      </div>
    </div>

    <!-- Message Checker -->
    <div class="checker-box">
      <h3>Check Message</h3>
      <input id="msg" placeholder="Enter message">
      <button onclick="checkMsg()">Analyze</button>
    </div>

  </div>

</div>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}

function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

function checkMsg(){
  let msg = document.getElementById("msg").value;

  if(msg.includes("OTP") || msg.includes("loan") || msg.includes("bank") || msg.includes("urgent")){
    alert("⚠️ Scam detected!");
  } else {
    alert("✅ Safe message");
  }
}
</script>

</body>
</html>
